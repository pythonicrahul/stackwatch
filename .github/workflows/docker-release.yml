name: Docker Release

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - '.dockerignore'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - '.github/workflows/docker-release.yml'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4.2.0
      - uses: docker/setup-buildx-action@v4.2.0

      - uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Multi-arch from day one — retrofitting arm64 onto already-published
      # tags later is much more annoying than building it in now.
      - uses: docker/build-push-action@v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/stackwatch-daemon:latest
            ghcr.io/${{ github.repository_owner }}/stackwatch-daemon:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # NOTE: unlike Actions secrets/variables, GITHUB_TOKEN CAN push to GHCR
      # with packages:write (this is a real, documented, grantable scope —
      # not the same kind of hard platform block we hit with repo variables
      # elsewhere in this project). Verified for real after the first push
      # from this workflow: the resulting package was immediately public —
      # `docker manifest inspect` and a raw anonymous-token manifest fetch
      # both succeeded with zero credentials, no manual visibility change
      # needed. (GHCR appears to inherit the pushing repo's own visibility —
      # this repo is public — rather than always defaulting new packages to
      # private; if you fork this into a private repo, check your package's
      # visibility after the first push rather than assuming either way.)
