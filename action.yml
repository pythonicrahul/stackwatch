name: 'stackwatch'
description: >
  Monitors the health of third-party developer tool status pages and posts an
  instant Slack alert when a monitored service degrades, recovers, or becomes
  unreachable. Silent when everything is healthy.
author: 'rahuljain'
branding:
  icon: 'activity'
  color: 'orange'

inputs:
  slack_webhook:
    description: 'Slack incoming webhook URL to post alerts to.'
    required: true
  monitor_github:
    description: 'Monitor GitHub status (githubstatus.com).'
    required: false
    default: 'false'
  monitor_datadog:
    description: 'Monitor Datadog status (status.datadoghq.com).'
    required: false
    default: 'false'
  monitor_clickhouse:
    description: 'Monitor ClickHouse Cloud status (status.clickhouse.com).'
    required: false
    default: 'false'
  monitor_claude:
    description: 'Monitor Claude / Anthropic status (status.claude.com).'
    required: false
    default: 'false'

outputs:
  has_incidents:
    description: 'true if any monitored vendor is in a new alertable incident this run.'
  new_incident_count:
    description: 'Number of new incidents alerted on this run.'
  recovered_count:
    description: 'Number of vendors that recovered this run.'
  alert_sent:
    description: 'true if a Slack message was sent and accepted this run.'

runs:
  using: 'node24'
  main: 'dist/index.js'
