name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-tag:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci
      - run: npm run package

      - name: Commit rebuilt dist/index.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist
          git diff --cached --quiet || git commit -m "chore: rebuild dist/index.js [skip ci]"
          git push

      - name: Force-update v1 major version tag
        run: |
          git tag -f v1
          git push origin v1 --force
